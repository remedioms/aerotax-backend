# fr24-ingest — ressourcen-gedeckelter, gehärteter FR24-Harvester für die NAS.
# docker compose v2 (DSM 7.2 Container Manager). Robustes Netzwerk-Herz aus dem
# Blueprint (Token-Bucket, 429/403-Freeze, dekorrelierter Jitter) → FR24-sicher.
#
# Start:  SUPABASE_KEY='<service-role-key>' docker compose up -d --build
services:
  fr24-harvester:
    build: .
    image: fr24-ingest:local
    container_name: fr24-harvester
    restart: unless-stopped

    # PID 1 = docker-init (tini): leitet SIGTERM an Python (add_signal_handler)
    # und reapt Zombies → sauberes Herunterfahren.
    init: true
    stop_grace_period: 30s

    user: "1000:1000"

    # Härtung: read-only Root-FS; nur /tmp (Heartbeat, RAM) schreibbar.
    # Kein /data-Volume: wir brauchen keinen lokalen SQLite-Cache — unser Store
    # IST Supabase fr24_live (Bulk-Kacheln, kein Per-Airframe-Lookup).
    read_only: true
    tmpfs:
      - /tmp:size=16m

    environment:
      PYTHONUNBUFFERED: "1"
      MALLOC_ARENA_MAX: "2"     # glibc-Arena-Fragmentierung dämpfen (RSS-Creep)

      SUPABASE_URL: "https://jyrbijvmwacuivssbxlg.supabase.co"
      SUPABASE_KEY: "${SUPABASE_KEY:?SUPABASE_KEY env fehlt}"
      TILES: "all"              # eine Node = alle 15 Kacheln round-robin
      POLL_INTERVAL_S: "90"     # LANGSAM: ~22min/Zyklus, unauffällig
      RATE_LIMIT_RPS: "0.02"    # Dauerrate ~1 Req/50s — weit unter FR24s Flag-Schwelle
      RATE_LIMIT_BURST: "2"
      BACKOFF_CAP_S: "1800"     # bei anhaltendem Block bis 30min ruhig
      LOG_LEVEL: "INFO"         # per-Poll nur DEBUG → Platten schlafen (Summary alle 30min)

    # Memory-Cap (cgroup): 256M — ein etwaiges Leck OOM-killt NUR diesen Container,
    # restart bringt ihn frisch. CPU-Quota (cpus) weggelassen: Synology-DSM-Kernel
    # mountet den CFS-Scheduler nicht ("NanoCPUs can not be set") — Memory reicht
    # als Leak-Containment; der Token-Bucket kappt die Last ohnehin.
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

    pids_limit: 64
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # Unrotierte json-Logs = klassischer stiller NAS-Volume-Killer → gedeckelt.
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

    # Liveness = „Poll-Loop läuft" (Heartbeat pro Zyklus, in RAM). NICHT Upstream-
    # Health — Neustart würde eine FR24-Drosselung nicht beheben.
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys,time; sys.exit(0 if time.time()-os.path.getmtime('/tmp/heartbeat')<300 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 45s
